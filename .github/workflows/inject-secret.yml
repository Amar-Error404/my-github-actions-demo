name: Inject Secret

on:
  workflow_dispatch:

jobs:
  inject:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 🔐 Replace placeholder with secret
        run: |
          # Read secret from environment
          SECRET="${{ secrets.DEMO_SECRET }}"
          # Replace placeholder in app.html
          sed -i "s|__DEMO_SECRET__|$SECRET|g" app.html
          echo "✅ Injection done"

      - name: 📦 Upload modified HTML
        uses: actions/upload-artifact@v4
        with:
          name: app-with-secret
          path: app.html