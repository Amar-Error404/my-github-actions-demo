name: My Third Workflow
on:
  workflow_dispatch:

jobs:
  job1_build:
    runs-on: ubuntu-latest
    steps:
      - name: build source code
        run: echo 'i will build the code first'

  job2_UnitTest:
    runs-on: ubuntu-latest
    needs: job1_build
    steps:
      - name: Run Test
        run: echo 'build is completed, now i will test the unit test'
  job3_SecurityScan:
    runs-on: ubuntu-latest
    needs: job1_build
    steps:
      - name: Scan Vulnerabilities
        run: echo 'build is completed now i will test the security scan'
  job4_deploy:
    runs-on: ubuntu-latest
    needs: [ job2_UnitTest, job3_SecurityScan]
    steps:
      - name: Final Deployment
        run: echo 'after testing and security passed, code is going live' 